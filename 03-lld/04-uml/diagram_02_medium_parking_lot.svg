<svg width="1000" height="720" viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">

  <defs>
    <marker id="open-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="hollow-diamond" viewBox="0 0 20 14" refX="1" refY="7" markerWidth="14" markerHeight="10" orient="auto">
      <polygon points="1,7 7,1 13,7 7,13" fill="white" stroke="#555" stroke-width="1.5"/>
    </marker>
    <marker id="filled-diamond" viewBox="0 0 20 14" refX="1" refY="7" markerWidth="14" markerHeight="10" orient="auto">
      <polygon points="1,7 7,1 13,7 7,13" fill="#444" stroke="#444" stroke-width="1.5"/>
    </marker>
    <marker id="hollow-triangle" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="10" markerHeight="10" orient="auto">
      <polygon points="1,1 13,7 1,13" fill="white" stroke="#555" stroke-width="1.5"/>
    </marker>
    <marker id="dashed-tri" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="10" markerHeight="10" orient="auto">
      <polygon points="1,1 13,7 1,13" fill="white" stroke="#555" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="1000" height="720" fill="#fafaf8"/>
  <text x="500" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Diagram 2 — Parking Lot System (Medium)</text>
  <text x="500" y="56" text-anchor="middle" font-size="13" fill="#666">Concepts: composition · association · aggregation · enumeration · multiplicity</text>

  <rect x="350" y="80" width="300" height="130" rx="6" fill="#f0eeff" stroke="#7c72d8" stroke-width="1.5"/>
  <text x="500" y="104" text-anchor="middle" font-size="15" font-weight="bold" fill="#26215C">ParkingLot</text>
  <line x1="350" y1="114" x2="650" y2="114" stroke="#7c72d8" stroke-width="1"/>
  <text x="366" y="132" font-size="12" fill="#3C3489">- lotId: String</text>
  <text x="366" y="150" font-size="12" fill="#3C3489">- name: String</text>
  <text x="366" y="168" font-size="12" fill="#3C3489">- floors: List&lt;Floor&gt;</text>
  <line x1="350" y1="178" x2="650" y2="178" stroke="#7c72d8" stroke-width="1"/>
  <text x="366" y="196" font-size="12" fill="#26215C">+ getAvailableSpots(): List</text>

  <polygon points="500,210 493,220 500,210 507,220" fill="#444" stroke="#444" stroke-width="1.5"/>
  <line x1="500" y1="220" x2="500" y2="260" stroke="#555" stroke-width="1.5" marker-end="url(#open-arrow)"/>
  <text x="510" y="242" font-size="11" fill="#555">1</text>
  <text x="510" y="258" font-size="11" fill="#555">1..*</text>

  <rect x="340" y="260" width="320" height="130" rx="6" fill="#e1f5ee" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="500" y="284" text-anchor="middle" font-size="15" font-weight="bold" fill="#04342C">Floor</text>
  <line x1="340" y1="294" x2="660" y2="294" stroke="#0F6E56" stroke-width="1"/>
  <text x="356" y="312" font-size="12" fill="#085041">- floorNumber: int</text>
  <text x="356" y="330" font-size="12" fill="#085041">- spots: List&lt;ParkingSpot&gt;</text>
  <line x1="340" y1="340" x2="660" y2="340" stroke="#0F6E56" stroke-width="1"/>
  <text x="356" y="358" font-size="12" fill="#04342C">+ getAvailableSpots(): List</text>
  <text x="356" y="376" font-size="12" fill="#04342C">+ addSpot(spot: ParkingSpot)</text>

  <polygon points="500,390 493,400 500,390 507,400" fill="#444" stroke="#444" stroke-width="1.5"/>
  <line x1="500" y1="400" x2="500" y2="440" stroke="#555" stroke-width="1.5" marker-end="url(#open-arrow)"/>
  <text x="510" y="422" font-size="11" fill="#555">1</text>
  <text x="510" y="438" font-size="11" fill="#555">1..*</text>

  <rect x="300" y="440" width="400" height="150" rx="6" fill="#e1f5ee" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="500" y="464" text-anchor="middle" font-size="15" font-weight="bold" fill="#04342C">ParkingSpot</text>
  <line x1="300" y1="474" x2="700" y2="474" stroke="#0F6E56" stroke-width="1"/>
  <text x="316" y="492" font-size="12" fill="#085041">- spotId: String</text>
  <text x="316" y="510" font-size="12" fill="#085041">- spotType: SpotType</text>
  <text x="316" y="528" font-size="12" fill="#085041">- vehicle: Vehicle</text>
  <line x1="300" y1="538" x2="700" y2="538" stroke="#0F6E56" stroke-width="1"/>
  <text x="316" y="556" font-size="12" fill="#04342C">+ isOccupied(): boolean</text>
  <text x="316" y="574" font-size="12" fill="#04342C">+ park(v: Vehicle)   + free()</text>

  <line x1="700" y1="530" x2="770" y2="530" stroke="#555" stroke-width="1.5" marker-end="url(#open-arrow)"/>
  <text x="706" y="522" font-size="11" fill="#555">0..1</text>
  <text x="754" y="522" font-size="11" fill="#555">1</text>

  <rect x="770" y="460" width="200" height="130" rx="6" fill="#faeeda" stroke="#854F0B" stroke-width="1.5"/>
  <text x="870" y="484" text-anchor="middle" font-size="15" font-weight="bold" fill="#412402">Vehicle</text>
  <line x1="770" y1="494" x2="970" y2="494" stroke="#854F0B" stroke-width="1"/>
  <text x="786" y="512" font-size="12" fill="#633806">- licensePlate: String</text>
  <text x="786" y="530" font-size="12" fill="#633806">- type: VehicleType</text>
  <line x1="770" y1="540" x2="970" y2="540" stroke="#854F0B" stroke-width="1"/>
  <text x="786" y="558" font-size="12" fill="#412402">+ getType(): VehicleType</text>
  <text x="786" y="576" font-size="12" fill="#412402">+ getPlate(): String</text>

  <rect x="60" y="440" width="200" height="150" rx="6" fill="#faece7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="160" y="464" text-anchor="middle" font-size="15" font-weight="bold" fill="#4A1B0C">Ticket</text>
  <line x1="60" y1="474" x2="260" y2="474" stroke="#993C1D" stroke-width="1"/>
  <text x="76" y="492" font-size="12" fill="#712B13">- ticketId: String</text>
  <text x="76" y="510" font-size="12" fill="#712B13">- entryTime: DateTime</text>
  <text x="76" y="528" font-size="12" fill="#712B13">- exitTime: DateTime</text>
  <text x="76" y="546" font-size="12" fill="#712B13">- spot: ParkingSpot</text>
  <line x1="60" y1="556" x2="260" y2="556" stroke="#993C1D" stroke-width="1"/>
  <text x="76" y="574" font-size="12" fill="#4A1B0C">+ calculateFee(): double</text>

  <line x1="260" y1="510" x2="300" y2="510" stroke="#555" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#open-arrow)"/>
  <text x="262" y="502" font-size="11" fill="#777">uses</text>

  <rect x="60" y="260" width="210" height="120" rx="6" fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <text x="165" y="282" text-anchor="middle" font-size="12" fill="#444">«enumeration»</text>
  <text x="165" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">SpotType</text>
  <line x1="60" y1="310" x2="270" y2="310" stroke="#888" stroke-width="1"/>
  <text x="76" y="328" font-size="12" fill="#444">COMPACT</text>
  <text x="76" y="346" font-size="12" fill="#444">LARGE</text>
  <text x="76" y="364" font-size="12" fill="#444">HANDICAPPED   MOTORCYCLE</text>

  <line x1="300" y1="488" x2="270" y2="380" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#open-arrow)"/>
  <text x="250" y="436" font-size="11" fill="#777">uses</text>

  <rect x="750" y="260" width="210" height="110" rx="6" fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <text x="855" y="282" text-anchor="middle" font-size="12" fill="#444">«enumeration»</text>
  <text x="855" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">VehicleType</text>
  <line x1="750" y1="310" x2="960" y2="310" stroke="#888" stroke-width="1"/>
  <text x="766" y="328" font-size="12" fill="#444">CAR</text>
  <text x="766" y="346" font-size="12" fill="#444">MOTORCYCLE</text>
  <text x="766" y="364" font-size="12" fill="#444">TRUCK   BUS</text>

  <line x1="870" y1="460" x2="870" y2="370" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#open-arrow)"/>
  <text x="878" y="418" font-size="11" fill="#777">uses</text>

  <rect x="20" y="658" width="960" height="46" rx="4" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
  <text x="80" y="672" font-size="11" fill="#333" font-weight="bold">Legend:</text>
  <polygon points="120,680 126,674 132,680 126,686" fill="#444" stroke="#444" stroke-width="1.5"/>
  <line x1="132" y1="680" x2="160" y2="680" stroke="#555" stroke-width="1.5" marker-end="url(#open-arrow)"/>
  <text x="168" y="684" font-size="11" fill="#333">Composition (owns)</text>
  <polygon points="310,680 316,674 322,680 316,686" fill="white" stroke="#555" stroke-width="1.5"/>
  <line x1="322" y1="680" x2="350" y2="680" stroke="#555" stroke-width="1.5" marker-end="url(#open-arrow)"/>
  <text x="358" y="684" font-size="11" fill="#333">Aggregation (has)</text>
  <line x1="490" y1="680" x2="530" y2="680" stroke="#555" stroke-width="1.5" marker-end="url(#open-arrow)"/>
  <text x="538" y="684" font-size="11" fill="#333">Association (knows)</text>
  <line x1="660" y1="680" x2="700" y2="680" stroke="#555" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#open-arrow)"/>
  <text x="708" y="684" font-size="11" fill="#333">Dependency (uses temporarily)</text>
  <text x="400" y="698" text-anchor="middle" font-size="11" fill="#555">Numbers on lines = multiplicity  e.g. 1..* = one or more</text>

</svg>
