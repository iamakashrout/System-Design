<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">

  <defs>
    <marker id="open-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="filled-diamond" viewBox="0 0 20 14" refX="1" refY="7" markerWidth="14" markerHeight="10" orient="auto">
      <polygon points="1,7 7,1 13,7 7,13" fill="#444" stroke="#444" stroke-width="1.5"/>
    </marker>
    <marker id="hollow-triangle" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="10" markerHeight="10" orient="auto">
      <polygon points="1,1 13,7 1,13" fill="white" stroke="#555" stroke-width="1.5"/>
    </marker>
    <marker id="dashed-tri" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="10" markerHeight="10" orient="auto">
      <polygon points="1,1 13,7 1,13" fill="white" stroke="#555" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#fafaf8"/>
  <text x="600" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Diagram 4 — E-Commerce Order System (Complex)</text>
  <text x="600" y="56" text-anchor="middle" font-size="13" fill="#666">Concepts: strategy pattern · multi-level composition · interface hierarchy · abstract class · all five arrows</text>

  <rect x="420" y="80" width="360" height="160" rx="6" fill="#f0eeff" stroke="#7c72d8" stroke-width="2"/>
  <text x="600" y="100" text-anchor="middle" font-size="12" fill="#534AB7">«aggregate root»</text>
  <text x="600" y="118" text-anchor="middle" font-size="16" font-weight="bold" fill="#26215C">Order</text>
  <line x1="420" y1="128" x2="780" y2="128" stroke="#7c72d8" stroke-width="1"/>
  <text x="436" y="146" font-size="12" fill="#3C3489">- orderId: String</text>
  <text x="436" y="164" font-size="12" fill="#3C3489">- customer: Customer</text>
  <text x="436" y="182" font-size="12" fill="#3C3489">- lineItems: List&lt;OrderLineItem&gt;</text>
  <text x="436" y="200" font-size="12" fill="#3C3489">- status: OrderStatus</text>
  <line x1="420" y1="210" x2="780" y2="210" stroke="#7c72d8" stroke-width="1"/>
  <text x="436" y="228" font-size="12" fill="#26215C">+ confirm()   + cancel(reason: String)</text>

  <polygon points="530,240 523,250 530,240 537,250" fill="#444" stroke="#444" stroke-width="1.5"/>
  <line x1="530" y1="250" x2="530" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#open-arrow)"/>
  <text x="538" y="277" font-size="11" fill="#444">1</text>
  <text x="538" y="297" font-size="11" fill="#444">1..*</text>

  <rect x="340" y="300" width="380" height="140" rx="6" fill="#e1f5ee" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="530" y="322" text-anchor="middle" font-size="16" font-weight="bold" fill="#04342C">OrderLineItem</text>
  <line x1="340" y1="332" x2="720" y2="332" stroke="#0F6E56" stroke-width="1"/>
  <text x="356" y="350" font-size="12" fill="#085041">- productName: String</text>
  <text x="356" y="368" font-size="12" fill="#085041">- quantity: int</text>
  <text x="356" y="386" font-size="12" fill="#085041">- priceAtOrder: double</text>
  <line x1="340" y1="396" x2="720" y2="396" stroke="#0F6E56" stroke-width="1"/>
  <text x="356" y="414" font-size="12" fill="#04342C">+ getSubtotal(): double</text>
  <text x="356" y="432" font-size="12" fill="#04342C">package-private constructor</text>

  <rect x="820" y="80" width="340" height="160" rx="6" fill="#f0eeff" stroke="#534AB7" stroke-width="1.5"/>
  <text x="990" y="102" text-anchor="middle" font-size="16" font-weight="bold" fill="#26215C">Customer</text>
  <line x1="820" y1="112" x2="1160" y2="112" stroke="#534AB7" stroke-width="1"/>
  <text x="836" y="130" font-size="12" fill="#3C3489">- customerId: String</text>
  <text x="836" y="148" font-size="12" fill="#3C3489">- name: String</text>
  <text x="836" y="166" font-size="12" fill="#3C3489">- email: String</text>
  <text x="836" y="184" font-size="12" fill="#3C3489">- tier: MembershipTier</text>
  <line x1="820" y1="194" x2="1160" y2="194" stroke="#534AB7" stroke-width="1"/>
  <text x="836" y="212" font-size="12" fill="#26215C">+ applyDiscount(price): double</text>
  <text x="836" y="230" font-size="12" fill="#26215C">+ upgradeTo(tier: MembershipTier)</text>

  <line x1="780" y1="160" x2="820" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#open-arrow)"/>
  <text x="786" y="152" font-size="11" fill="#444">1</text>
  <text x="804" y="152" font-size="11" fill="#444">1</text>

  <rect x="820" y="300" width="160" height="80" rx="6" fill="#fbeaf0" stroke="#993556" stroke-width="1.5"/>
  <text x="900" y="320" text-anchor="middle" font-size="12" fill="#72243E">«interface»</text>
  <text x="900" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#4B1528">MembershipTier</text>
  <line x1="820" y1="350" x2="980" y2="350" stroke="#993556" stroke-width="1"/>
  <text x="836" y="366" font-size="12" fill="#4B1528">+ getDiscountRate(): double</text>

  <line x1="990" y1="194" x2="990" y2="250" stroke="#555" stroke-width="1.5" stroke-dasharray="6 3"/>
  <line x1="990" y1="250" x2="900" y2="250" stroke="#555" stroke-width="1.5" stroke-dasharray="6 3"/>
  <line x1="900" y1="250" x2="900" y2="300" stroke="#555" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#open-arrow)"/>
  <text x="938" y="243" font-size="11" fill="#777">uses</text>

  <line x1="900" y1="380" x2="900" y2="420" stroke="#555" stroke-width="1.5"/>
  <line x1="820" y1="420" x2="980" y2="420" stroke="#555" stroke-width="1.5"/>
  <line x1="820" y1="420" x2="820" y2="450" stroke="#555" stroke-width="1.5" marker-end="url(#dashed-tri)"/>
  <line x1="980" y1="420" x2="980" y2="450" stroke="#555" stroke-width="1.5" marker-end="url(#dashed-tri)"/>
  <text x="840" y="413" font-size="11" fill="#777">implements</text>

  <rect x="720" y="450" width="180" height="100" rx="6" fill="#fbeaf0" stroke="#993556" stroke-width="1.5"/>
  <text x="810" y="472" text-anchor="middle" font-size="14" font-weight="bold" fill="#4B1528">StandardTier</text>
  <line x1="720" y1="482" x2="900" y2="482" stroke="#993556" stroke-width="1"/>
  <text x="736" y="500" font-size="12" fill="#72243E">+ getDiscountRate(): double</text>
  <text x="736" y="516" font-size="12" fill="#99337e">return 0.0</text>
  <text x="736" y="534" font-size="12" fill="#72243E">getTierName(): String</text>

  <rect x="920" y="450" width="180" height="100" rx="6" fill="#fbeaf0" stroke="#993556" stroke-width="1.5"/>
  <text x="1010" y="472" text-anchor="middle" font-size="14" font-weight="bold" fill="#4B1528">PremiumTier</text>
  <line x1="920" y1="482" x2="1100" y2="482" stroke="#993556" stroke-width="1"/>
  <text x="936" y="500" font-size="12" fill="#72243E">+ getDiscountRate(): double</text>
  <text x="936" y="516" font-size="12" fill="#99337e">return 0.15</text>
  <text x="936" y="534" font-size="12" fill="#72243E">getTierName(): String</text>

  <rect x="40" y="80" width="340" height="160" rx="6" fill="#faeeda" stroke="#854F0B" stroke-width="2"/>
  <text x="210" y="100" text-anchor="middle" font-size="12" fill="#633806">«abstract»</text>
  <text x="210" y="118" text-anchor="middle" font-size="16" font-weight="bold" fill="#412402" font-style="italic">Payment</text>
  <line x1="40" y1="128" x2="380" y2="128" stroke="#854F0B" stroke-width="1"/>
  <text x="56" y="146" font-size="12" fill="#633806">- paymentId: String</text>
  <text x="56" y="164" font-size="12" fill="#633806">- amount: double</text>
  <text x="56" y="182" font-size="12" fill="#633806">- status: PaymentStatus</text>
  <line x1="40" y1="192" x2="380" y2="192" stroke="#854F0B" stroke-width="1"/>
  <text x="56" y="210" font-size="12" fill="#412402" font-style="italic">+ process(): PaymentResult</text>
  <text x="56" y="228" font-size="12" fill="#412402">+ getStatus(): PaymentStatus</text>

  <line x1="420" y1="160" x2="380" y2="160" stroke="#555" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#open-arrow)"/>
  <text x="385" y="152" font-size="11" fill="#777">uses</text>

  <line x1="210" y1="240" x2="210" y2="270" stroke="#555" stroke-width="1.5"/>
  <line x1="100" y1="270" x2="320" y2="270" stroke="#555" stroke-width="1.5"/>
  <line x1="100" y1="270" x2="100" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#hollow-triangle)"/>
  <line x1="320" y1="270" x2="320" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#hollow-triangle)"/>
  <text x="210" y="263" text-anchor="middle" font-size="11" fill="#555">extends</text>

  <rect x="20" y="300" width="160" height="100" rx="6" fill="#faeeda" stroke="#854F0B" stroke-width="1.5"/>
  <text x="100" y="322" text-anchor="middle" font-size="14" font-weight="bold" fill="#412402">CreditCard</text>
  <line x1="20" y1="332" x2="180" y2="332" stroke="#854F0B" stroke-width="1"/>
  <text x="36" y="350" font-size="12" fill="#633806">- cardNumber: String</text>
  <text x="36" y="368" font-size="12" fill="#633806">- cvv: String</text>
  <line x1="20" y1="378" x2="180" y2="378" stroke="#854F0B" stroke-width="1"/>
  <text x="36" y="396" font-size="12" fill="#412402">+ process()</text>

  <rect x="210" y="300" width="160" height="100" rx="6" fill="#faeeda" stroke="#854F0B" stroke-width="1.5"/>
  <text x="290" y="322" text-anchor="middle" font-size="14" font-weight="bold" fill="#412402">UPIPayment</text>
  <line x1="210" y1="332" x2="370" y2="332" stroke="#854F0B" stroke-width="1"/>
  <text x="226" y="350" font-size="12" fill="#633806">- upiId: String</text>
  <text x="226" y="368" font-size="12" fill="#633806">- bankName: String</text>
  <line x1="210" y1="378" x2="370" y2="378" stroke="#854F0B" stroke-width="1"/>
  <text x="226" y="396" font-size="12" fill="#412402">+ process()</text>

  <rect x="40" y="500" width="300" height="80" rx="6" fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <text x="190" y="520" text-anchor="middle" font-size="12" fill="#444">«enumeration»</text>
  <text x="190" y="538" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">OrderStatus</text>
  <line x1="40" y1="548" x2="340" y2="548" stroke="#888" stroke-width="1"/>
  <text x="56" y="566" font-size="12" fill="#444">PENDING   CONFIRMED   SHIPPED   DELIVERED   CANCELLED</text>

  <line x1="420" y1="210" x2="340" y2="560" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#open-arrow)"/>
  <text x="348" y="390" font-size="11" fill="#777">uses</text>

  <rect x="40" y="620" width="300" height="80" rx="6" fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <text x="190" y="640" text-anchor="middle" font-size="12" fill="#444">«enumeration»</text>
  <text x="190" y="658" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">PaymentStatus</text>
  <line x1="40" y1="668" x2="340" y2="668" stroke="#888" stroke-width="1"/>
  <text x="56" y="686" font-size="12" fill="#444">PENDING   SUCCESS   FAILED   REFUNDED</text>

  <line x1="210" y1="620" x2="210" y2="400" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#open-arrow)"/>

  <rect x="20" y="730" width="1160" height="150" rx="6" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="600" y="752" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Key Design Patterns in This Diagram</text>
  <text x="40" y="774" font-size="12" fill="#444">STRATEGY PATTERN: Customer composes a MembershipTier interface. Swapping StandardTier for PremiumTier at runtime</text>
  <text x="40" y="792" font-size="12" fill="#444">   changes behavior without recreating the Customer object. This is the Strategy Pattern encoded in UML.</text>
  <text x="40" y="814" font-size="12" fill="#444">TEMPLATE METHOD: Payment is abstract with a concrete process() marked italic. CreditCard and UPIPayment</text>
  <text x="40" y="832" font-size="12" fill="#444">   override process() with their own logic — a Template Method variant.</text>
  <text x="40" y="854" font-size="12" fill="#444">COMPOSITION CHAIN: Order ◆→ OrderLineItem (multi-level). OrderLineItem has package-private constructor — only Order creates it.</text>

</svg>
