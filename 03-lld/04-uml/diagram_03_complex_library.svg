<svg width="1100" height="860" viewBox="0 0 1100 860" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">

  <defs>
    <marker id="open-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="filled-diamond" viewBox="0 0 20 14" refX="1" refY="7" markerWidth="14" markerHeight="10" orient="auto">
      <polygon points="1,7 7,1 13,7 7,13" fill="#444" stroke="#444" stroke-width="1.5"/>
    </marker>
    <marker id="hollow-diamond" viewBox="0 0 20 14" refX="1" refY="7" markerWidth="14" markerHeight="10" orient="auto">
      <polygon points="1,7 7,1 13,7 7,13" fill="white" stroke="#555" stroke-width="1.5"/>
    </marker>
    <marker id="hollow-triangle" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="10" markerHeight="10" orient="auto">
      <polygon points="1,1 13,7 1,13" fill="white" stroke="#555" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="1100" height="860" fill="#fafaf8"/>
  <text x="550" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Diagram 3 — Library Management System (Complex)</text>
  <text x="550" y="56" text-anchor="middle" font-size="13" fill="#666">Concepts: all five relationships · aggregate root · value object · service layer · information expert</text>

  <rect x="380" y="80" width="340" height="140" rx="6" fill="#f0eeff" stroke="#7c72d8" stroke-width="2"/>
  <text x="550" y="100" text-anchor="middle" font-size="12" fill="#534AB7">«aggregate root»</text>
  <text x="550" y="118" text-anchor="middle" font-size="16" font-weight="bold" fill="#26215C">Library</text>
  <line x1="380" y1="128" x2="720" y2="128" stroke="#7c72d8" stroke-width="1"/>
  <text x="396" y="146" font-size="12" fill="#3C3489">- name: String</text>
  <text x="396" y="164" font-size="12" fill="#3C3489">- books: Map&lt;ISBN, Book&gt;</text>
  <text x="396" y="182" font-size="12" fill="#3C3489">- members: Map&lt;String, Member&gt;</text>
  <line x1="380" y1="192" x2="720" y2="192" stroke="#7c72d8" stroke-width="1"/>
  <text x="396" y="208" font-size="12" fill="#26215C">+ addBook(isbn, title, author): Book</text>

  <polygon points="450,220 443,230 450,220 457,230" fill="#444" stroke="#444" stroke-width="1.5"/>
  <line x1="450" y1="230" x2="450" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#open-arrow)"/>
  <text x="458" y="257" font-size="11" fill="#444">1</text>
  <text x="458" y="277" font-size="11" fill="#444">0..*</text>

  <polygon points="650,220 643,230 650,220 657,230" fill="#444" stroke="#444" stroke-width="1.5"/>
  <line x1="650" y1="230" x2="650" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#open-arrow)"/>
  <text x="658" y="257" font-size="11" fill="#444">1</text>
  <text x="658" y="277" font-size="11" fill="#444">0..*</text>

  <rect x="280" y="280" width="320" height="150" rx="6" fill="#e1f5ee" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="440" y="302" text-anchor="middle" font-size="16" font-weight="bold" fill="#04342C">Book</text>
  <line x1="280" y1="312" x2="600" y2="312" stroke="#0F6E56" stroke-width="1"/>
  <text x="296" y="330" font-size="12" fill="#085041">- isbn: ISBN</text>
  <text x="296" y="348" font-size="12" fill="#085041">- title: String</text>
  <text x="296" y="366" font-size="12" fill="#085041">- author: String</text>
  <text x="296" y="384" font-size="12" fill="#085041">- copies: List&lt;BookCopy&gt;</text>
  <line x1="280" y1="394" x2="600" y2="394" stroke="#0F6E56" stroke-width="1"/>
  <text x="296" y="412" font-size="12" fill="#04342C">+ addCopy(id): BookCopy</text>

  <rect x="480" y="280" width="340" height="150" rx="6" fill="#f0eeff" stroke="#534AB7" stroke-width="1.5"/>
  <text x="650" y="302" text-anchor="middle" font-size="16" font-weight="bold" fill="#26215C">Member</text>
  <line x1="480" y1="312" x2="820" y2="312" stroke="#534AB7" stroke-width="1"/>
  <text x="496" y="330" font-size="12" fill="#3C3489">- memberId: String</text>
  <text x="496" y="348" font-size="12" fill="#3C3489">- name: String</text>
  <text x="496" y="366" font-size="12" fill="#3C3489">- activeBorrowings: List&lt;Borrowing&gt;</text>
  <line x1="480" y1="376" x2="820" y2="376" stroke="#534AB7" stroke-width="1"/>
  <text x="496" y="394" font-size="12" fill="#26215C">+ hasReachedBorrowLimit(): bool</text>
  <text x="496" y="412" font-size="12" fill="#26215C">+ addBorrowing(b: Borrowing)</text>

  <polygon points="360,430 353,440 360,430 367,440" fill="#444" stroke="#444" stroke-width="1.5"/>
  <line x1="360" y1="440" x2="360" y2="500" stroke="#555" stroke-width="1.5" marker-end="url(#open-arrow)"/>
  <text x="368" y="472" font-size="11" fill="#444">1</text>
  <text x="368" y="497" font-size="11" fill="#444">1..*</text>

  <polygon points="650,430 643,440 650,430 657,440" fill="#444" stroke="#444" stroke-width="1.5"/>
  <line x1="650" y1="430" x2="650" y2="500" stroke="#555" stroke-width="1.5" marker-end="url(#open-arrow)"/>
  <text x="658" y="466" font-size="11" fill="#444">1</text>
  <text x="658" y="497" font-size="11" fill="#444">0..5</text>

  <rect x="200" y="500" width="320" height="150" rx="6" fill="#e1f5ee" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="360" y="522" text-anchor="middle" font-size="16" font-weight="bold" fill="#04342C">BookCopy</text>
  <line x1="200" y1="532" x2="520" y2="532" stroke="#0F6E56" stroke-width="1"/>
  <text x="216" y="550" font-size="12" fill="#085041">- copyId: String</text>
  <text x="216" y="568" font-size="12" fill="#085041">- book: Book</text>
  <text x="216" y="586" font-size="12" fill="#085041">- available: boolean</text>
  <line x1="200" y1="596" x2="520" y2="596" stroke="#0F6E56" stroke-width="1"/>
  <text x="216" y="614" font-size="12" fill="#04342C">+ markBorrowed()</text>
  <text x="216" y="632" font-size="12" fill="#04342C">+ markReturned()</text>

  <rect x="480" y="500" width="340" height="180" rx="6" fill="#faeeda" stroke="#854F0B" stroke-width="1.5"/>
  <text x="650" y="522" text-anchor="middle" font-size="16" font-weight="bold" fill="#412402">Borrowing</text>
  <line x1="480" y1="532" x2="820" y2="532" stroke="#854F0B" stroke-width="1"/>
  <text x="496" y="550" font-size="12" fill="#633806">- borrowDate: LocalDate</text>
  <text x="496" y="568" font-size="12" fill="#633806">- dueDate: LocalDate</text>
  <text x="496" y="586" font-size="12" fill="#633806">- returnDate: LocalDate</text>
  <text x="496" y="604" font-size="12" fill="#633806">- member: Member</text>
  <text x="496" y="622" font-size="12" fill="#633806">- copy: BookCopy</text>
  <line x1="480" y1="632" x2="820" y2="632" stroke="#854F0B" stroke-width="1"/>
  <text x="496" y="650" font-size="12" fill="#412402">+ calculateFine(): double</text>
  <text x="496" y="668" font-size="12" fill="#412402">+ isOverdue(): boolean</text>

  <line x1="520" y1="590" x2="480" y2="590" stroke="#555" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#open-arrow)"/>
  <text x="494" y="582" font-size="11" fill="#555">assoc.</text>

  <rect x="60" y="500" width="110" height="80" rx="6" fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <text x="115" y="520" text-anchor="middle" font-size="11" fill="#444">«value object»</text>
  <text x="115" y="538" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">ISBN</text>
  <line x1="60" y1="548" x2="170" y2="548" stroke="#888" stroke-width="1"/>
  <text x="76" y="564" font-size="12" fill="#444">- value: String</text>

  <line x1="200" y1="548" x2="170" y2="548" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#open-arrow)"/>
  <text x="176" y="540" font-size="11" fill="#777">uses</text>

  <rect x="820" y="280" width="240" height="130" rx="6" fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <text x="940" y="300" text-anchor="middle" font-size="12" fill="#444">«service»</text>
  <text x="940" y="318" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">BorrowingService</text>
  <line x1="820" y1="328" x2="1060" y2="328" stroke="#888" stroke-width="1"/>
  <text x="836" y="346" font-size="12" fill="#444">- library: Library</text>
  <line x1="820" y1="356" x2="1060" y2="356" stroke="#888" stroke-width="1"/>
  <text x="836" y="374" font-size="12" fill="#444">+ borrowBook(memberId,isbn)</text>
  <text x="836" y="392" font-size="12" fill="#444">+ returnBook(borrowingId)</text>

  <line x1="820" y1="310" x2="720" y2="180" stroke="#555" stroke-width="1.2" stroke-dasharray="6 3" marker-end="url(#open-arrow)"/>
  <text x="758" y="250" font-size="11" fill="#777">uses</text>

  <rect x="820" y="500" width="240" height="90" rx="6" fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <text x="940" y="520" text-anchor="middle" font-size="11" fill="#444">«enumeration»</text>
  <text x="940" y="538" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">BorrowStatus</text>
  <line x1="820" y1="548" x2="1060" y2="548" stroke="#888" stroke-width="1"/>
  <text x="836" y="566" font-size="12" fill="#444">ACTIVE</text>
  <text x="836" y="582" font-size="12" fill="#444">RETURNED    OVERDUE</text>

  <line x1="820" y1="556" x2="820" y2="590" stroke="#888" stroke-width="1" stroke-dasharray="5 3"/>
  <line x1="820" y1="590" x2="820" y2="590" stroke="#888" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#open-arrow)"/>

  <rect x="20" y="714" width="1060" height="130" rx="4" fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="540" y="734" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Design Decisions Encoded in This Diagram</text>
  <text x="40" y="756" font-size="12" fill="#444">◆ Library→Book, Library→Member: Composition — Library creates these, they don't exist outside it (aggregate root pattern)</text>
  <text x="40" y="774" font-size="12" fill="#444">◆ Book→BookCopy: Composition — BookCopy is created inside Book.addCopy(), has no life outside a Book</text>
  <text x="40" y="792" font-size="12" fill="#444">◆ Member→Borrowing: Composition — Borrowings exist because of borrowing activity, tied to Member lifecycle</text>
  <text x="40" y="810" font-size="12" fill="#444">→ Borrowing→BookCopy: Association — Borrowing knows which copy is borrowed, but doesn't own it</text>
  <text x="40" y="828" font-size="12" fill="#444">calculateFine() on Borrowing: Information Expert — it owns dueDate and returnDate, so it calculates the fine</text>

</svg>
